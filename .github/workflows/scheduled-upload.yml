name: Scheduled Story Upload

on:
  workflow_dispatch:
  schedule:
    # Runs at 06:00, 14:00, and 22:00 Asia/Kolkata.
    - cron: "30 0,8,16 * * *"

permissions:
  contents: write

jobs:
  upload-story:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore local secrets
        shell: pwsh
        run: |
          @"
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_GRAPH_BASE_URL=https://graph.instagram.com
          INSTAGRAM_GRAPH_API_VERSION=v25.0
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_FOLDER=the-ashy-notes/reels
          "@ | Set-Content -Path .env -Encoding UTF8

          [IO.File]::WriteAllText(
            "client_secret.json",
            [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("${{ secrets.YOUTUBE_CLIENT_SECRET_JSON_B64 }}"))
          )
          [IO.File]::WriteAllText(
            "token.json",
            [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("${{ secrets.YOUTUBE_TOKEN_JSON_B64 }}"))
          )

      - name: Render and publish next story
        run: python automation_pipeline.py --upload-youtube --upload-instagram --cloudinary

      - name: Commit publish state
        shell: pwsh
        run: |
          git config user.name "the-ashy-notes-bot"
          git config user.email "actions@github.com"
          git add state/published_stories.json
          if (-not (git diff --cached --quiet)) {
            git commit -m "Record scheduled story upload"
            git push
          }
